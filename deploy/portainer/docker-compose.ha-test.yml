# Home Assistant + OpenObserve — local test stack for the HACS *integration*
# Deploy in Portainer as a new stack (e.g. name: ha-openobserve-test).
#
# What this tests:
#   - custom_components/openobserve (logs + events → OpenObserve /_json)
#
# What this does NOT test:
#   - Optional: home-assistant-openobserve-addon (Supervisor only, not plain container HA)
#
# After first boot (~2 min):
#   - HA UI: http://<host>:8123
#   - OpenObserve UI: http://<host>:5080
#   - Add integration: OpenObserve URL = http://openobserve:5080 (Docker network name)
#   - Credentials: match ZO_ROOT_USER_* below (first boot only — empty volumes required)

services:
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: openobserve
    restart: unless-stopped
    ports:
      - "5080:5080"
      - "5081:5081"
    volumes:
      - openobserve-data:/data
    environment:
      ZO_DATA_DIR: /data
      ZO_ROOT_USER_EMAIL: ${ZO_ROOT_USER_EMAIL:-admin@example.com}
      ZO_ROOT_USER_PASSWORD: ${ZO_ROOT_USER_PASSWORD:?set ZO_ROOT_USER_PASSWORD}
    networks:
      - ha-test

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant-test
    restart: unless-stopped
    ports:
      - "8123:8123"
    volumes:
      # Persist HA config; integration is bind-mounted from repo
      - ha-config:/config
      - ../../custom_components/openobserve:/config/custom_components/openobserve:ro
    environment:
      TZ: ${TZ:-America/New_York}
    networks:
      - ha-test
    depends_on:
      - openobserve

networks:
  ha-test:

volumes:
  openobserve-data:
  ha-config:
