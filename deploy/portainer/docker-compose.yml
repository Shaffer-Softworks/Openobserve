# OpenObserve OSS — deploy via Portainer (Stacks) or: docker compose up -d
# Docs: https://openobserve.ai/docs/getting-started/
#
# ZO_ROOT_USER_EMAIL and ZO_ROOT_USER_PASSWORD apply ONLY on first startup (empty volume).
# If login fails after changing env vars, stop the stack and delete volume openobserve_openobserve-data, then start again.
services:
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: openobserve
    restart: unless-stopped
    ports:
      - "5080:5080"
      - "5081:5081"
    volumes:
      - openobserve-data:/data
    environment:
      ZO_DATA_DIR: /data
      ZO_ROOT_USER_EMAIL: ${ZO_ROOT_USER_EMAIL:-root@example.com}
      ZO_ROOT_USER_PASSWORD: ${ZO_ROOT_USER_PASSWORD:?set ZO_ROOT_USER_PASSWORD}

volumes:
  openobserve-data:
